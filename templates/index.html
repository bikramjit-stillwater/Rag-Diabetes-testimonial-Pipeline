<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Diabetes Testimonial Chatbot</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="container">
    <h1>Diabetes Testimonial Chatbot</h1>
    <p class="subtitle">Ask questions from patient testimonial data.</p>

    <div class="preset-questions">
      <button onclick="sendPresetQuestion('Find testimonials where people reduced diabetes medicine after switching to plant-based diet')">
        1. Reduced medicine after plant-based diet
      </button>

      <button onclick="sendPresetQuestion('Find patient stories that talk about plant-based diet helping diabetes')">
        2. Plant-based diet helping diabetes
      </button>

      <button onclick="sendPresetQuestion('Find testimonials where patients describe how long they had diabetes')">
        3. Duration of diabetes in testimonials
      </button>
    </div>

    <div id="chat-box" class="chat-box"></div>

    <div class="input-area">
      <input type="text" id="user-input" placeholder="Type your question..." />
      <button onclick="sendMessage()">Send</button>
    </div>
  </div>

  <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
